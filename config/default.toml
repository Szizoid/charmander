# Charmander — configuration
#
# This file is created automatically on first launch.
# You can edit it manually — changes take effect on the next run.
# Location: ~/.config/charmander/config.toml

[settings]

# Maximum number of characters shown in the results list.
# 0 means no limit — show all matches.
max-results = 0

# String displayed to the left of the currently selected row during keyboard navigation.
# Important: selection-indicator and no-selection-indicator must have the same character
# count (not byte count), otherwise the list will shift when navigating.
#
# Examples:
#   selection-indicator = "> "   # classic arrow
#   selection-indicator = "» "   # double angle bracket
#   selection-indicator = "● "   # filled circle
selection-indicator = "> "

# String displayed to the left of unselected rows.
# Typically spaces matching the width of selection-indicator.
#
# Examples:
#   no-selection-indicator = "  "   # two spaces (pair for "> ")
#   no-selection-indicator = "○ "   # empty circle (pair for "● ")
no-selection-indicator = "  "


# ─────────────────────────────────────────────
# Character library
# ─────────────────────────────────────────────
#
# Each character is defined by a [[characters]] block.
# Add your own characters following the same pattern.
#
# Fields:
#   symbol  — the character itself (single Unicode codepoint or ligature)
#   name    — full English name; used in search
#   tags    — list of search keywords; more tags means better discoverability
#
# Search ranking:
#   exact tag match > tag starts with query > tag contains query > name contains query
#   Within the same match tier, more frequently used characters appear higher.

# ── Arrows ───────────────────────────────────

[[characters]]
symbol = "→"
name = "right arrow"
tags = ["arrow", "right", "->", "math"]

[[characters]]
symbol = "←"
name = "left arrow"
tags = ["arrow", "left", "math"]

[[characters]]
symbol = "↑"
name = "up arrow"
tags = ["arrow", "up", "math"]

[[characters]]
symbol = "↓"
name = "down arrow"
tags = ["arrow", "down", "math"]

[[characters]]
symbol = "↔"
name = "left right arrow"
tags = ["arrow", "bidirectional", "math"]

[[characters]]
symbol = "⇒"
name = "double right arrow"
tags = ["arrow", "right", "double", "implies", "math", "logic"]

[[characters]]
symbol = "⇐"
name = "double left arrow"
tags = ["arrow", "left", "double", "math", "logic"]

[[characters]]
symbol = "⇔"
name = "double left right arrow"
tags = ["arrow", "bidirectional", "double", "iff", "math", "logic"]

