# Charmander — конфигурация
#
# Этот файл создаётся автоматически при первом запуске.
# Вы можете редактировать его вручную — изменения вступят в силу при следующем запуске.
# Расположение: ~/.config/charmander/config.toml

[settings]

# Максимальное количество символов в списке результатов.
# 0 — показывать все совпадения без ограничений.
max-results = 0

# Символ, который отображается слева от выбранной строки при навигации стрелками.
# Важно: длина selection-indicator и no-selection-indicator должна совпадать
# (по количеству символов), иначе текст будет смещаться при навигации.
#
# Примеры:
#   selection-indicator = "> "   # классическая стрелка
#   selection-indicator = "» "   # двойная стрелка
#   selection-indicator = "● "   # точка
selection-indicator = "> "

# Символ, который отображается слева от невыбранных строк.
# Обычно — пробелы той же ширины, что и selection-indicator.
#
# Примеры:
#   no-selection-indicator = "  "   # два пробела (для "> ")
#   no-selection-indicator = "○ "   # кружок (пара к "● ")
no-selection-indicator = "  "


# ─────────────────────────────────────────────
# Библиотека символов
# ─────────────────────────────────────────────
#
# Каждый символ описывается блоком [[characters]].
# Добавляйте свои символы по тому же образцу.
#
# Поля:
#   symbol  — сам символ (одиночный Unicode-символ или лигатура)
#   name    — полное название на английском; используется в поиске
#   tags    — список ключевых слов для поиска; чем больше — тем лучше
#
# Алгоритм поиска:
#   Точное совпадение тега > тег начинается с запроса > тег содержит запрос > имя содержит запрос
#   Среди равнозначных совпадений — символы, которые вы использовали чаще, показываются выше.

# ── Стрелки ──────────────────────────────────

[[characters]]
symbol = "→"
name = "right arrow"
tags = ["arrow", "right", "->", "math"]

[[characters]]
symbol = "←"
name = "left arrow"
tags = ["arrow", "left", "math"]

[[characters]]
symbol = "↑"
name = "up arrow"
tags = ["arrow", "up", "math"]

[[characters]]
symbol = "↓"
name = "down arrow"
tags = ["arrow", "down", "math"]

[[characters]]
symbol = "↔"
name = "left right arrow"
tags = ["arrow", "bidirectional", "math"]

[[characters]]
symbol = "⇒"
name = "double right arrow"
tags = ["arrow", "right", "double", "implies", "math", "logic"]

[[characters]]
symbol = "⇐"
name = "double left arrow"
tags = ["arrow", "left", "double", "math", "logic"]

[[characters]]
